services:
  - type: web
    name: hangzhou-cultural-tourism
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: DB_PATH
        value: /var/data/west-lake.sqlite
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: west-lake-data
      mountPath: /var/data
      sizeGB: 1
